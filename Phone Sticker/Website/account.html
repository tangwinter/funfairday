<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - FunFairDay</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="js/cart.js"></script>
    <style>
        .account-page {
            min-height: 100vh;
            padding: 100px 20px 60px;
        }
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .account-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--dark);
        }
        .account-email {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .account-logout-btn {
            padding: 8px 20px;
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            font-family: var(--font);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .account-logout-btn:hover {
            background: var(--primary);
            color: white;
        }
        .account-section {
            background: white;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .account-section h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .order-card {
            padding: 20px;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 12px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .order-card:last-child { margin-bottom: 0; }
        .order-card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 12px rgba(255,107,107,0.1);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .order-id {
            font-weight: 700;
            color: var(--dark);
            font-size: 0.95rem;
        }
        .order-date {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .order-total {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .order-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .order-status-pending { background: #fff3e0; color: #e65100; }
        .order-status-processing { background: #e3f2fd; color: #1565c0; }
        .order-status-shipped { background: #e8f5e9; color: #2e7d32; }
        .order-status-delivered { background: #e8f5e9; color: #1b5e20; }
        .order-status-cancelled { background: #fce4ec; color: #c62828; }
        .order-items { margin-top: 12px; }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 0.85rem;
        }
        .order-item:last-child { border-bottom: none; }
        .order-item-name { color: var(--dark); font-weight: 600; }
        .order-item-detail { color: var(--text-light); font-size: 0.8rem; }
        .order-item-price { color: var(--primary); font-weight: 700; }
        .no-orders {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }
        .no-orders svg {
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .no-orders p {
            margin-bottom: 20px;
        }
        .loading-state {
            text-align: center;
            padding: 48px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/FFD Logo.jpeg" alt="FunFairDay Logo" class="logo-img">
                <span class="logo-text" id="siteNameHeader">FunFairDay</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html#categories" class="nav-link">Shop</a>
            </nav>
            <button class="cart-btn" id="cartBtn" aria-label="Open Cart">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <div class="account-page">
        <div class="container">
            <div class="account-header">
                <div>
                    <h1>My Account</h1>
                    <span class="account-email" id="userEmail"></span>
                </div>
                <button class="account-logout-btn" id="logoutBtn">Logout</button>
            </div>

            <div class="account-section">
                <h2>Order History</h2>
                <div id="ordersContainer">
                    <div class="loading-state">Loading your orders...</div>
                </div>
            </div>

            <div class="account-section">
                <h2>Shipping Address</h2>
                <div id="profileContainer">
                    <div class="loading-state">Loading profile...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Overlay & Panel (same as index.html) -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="cart-close" id="cartClose" aria-label="Close Cart">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <!-- Shipping Section -->
            <div class="cart-shipping" id="cartShipping">
                <div class="cart-shipping-header">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="3 11 8 11 10 13 14 13 16 11 21 11"/></svg>
                    <span>Shipping</span>
                </div>
                <div class="cart-shipping-row">
                    <label class="cart-shipping-label">Shipping to:</label>
                    <span class="cart-shipping-destination" id="shippingDestination">—</span>
                </div>
                <div class="cart-shipping-methods" id="shippingMethods"></div>
                <div class="cart-shipping-free" id="shippingFree" style="display:none;">
                    🎉 Free Shipping (Free Gift in cart!)
                </div>
            </div>
            <div class="cart-total-row">
                <div class="cart-subtotal">
                    <span>Subtotal:</span>
                    <span id="cartSubtotal">$0.00</span>
                </div>
                <div class="cart-shipping-line" id="shippingLine" style="display:none;">
                    <span>Shipping:</span>
                    <span id="shippingLineCost">$0.00</span>
                </div>
            </div>
            <div class="cart-total">
                <span>Total:</span>
                <span class="cart-total-price" id="cartTotal">$0.00</span>
            </div>
            <div class="cart-address-missing" id="cartAddressMissing" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Please <a href="address-form.html" style="color:var(--primary);font-weight:700;text-decoration:underline;">add your shipping address</a> to checkout</span>
            </div>
            <button class="btn btn-primary btn-checkout" id="checkoutBtn">Checkout</button>
        </div>
    </div>

    <script>
        let supabase = null;
        let accessToken = null;

        async function initSupabase() {
            try {
                const res = await fetch('/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { return false; }
                supabase = window.supabase.createClient(config.url, config.anonKey);
                // Cache config for main.js auth init
                localStorage.setItem('supabase_url', config.url);
                localStorage.setItem('supabase_anon_key', config.anonKey);
                return true;
            } catch(e) {
                return false;
            }
        }

        ;(async function() {
            const ready = await initSupabase();
            if (!ready) {
                document.getElementById('ordersContainer').innerHTML =
                    '<div class="loading-state">Site not configured yet.</div>';
                return;
            }

            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) {
                window.location.href = 'login.html';
                return;
            }

            accessToken = session.access_token;
            document.getElementById('userEmail').textContent = session.user.email;

            // Signal to main.js that auth is ready
            window._authChecked = true;
            window._isLoggedIn = true;

            // Store metadata for showProfile
            window._userMeta = session.user.user_metadata || {};
            var userName = window._userMeta.full_name || localStorage.getItem('funfairday_user_name') || '';

            // Fetch saved address from Supabase
            var dbAddress = null;
            try {
                var { data: addrRows } = await supabase
                    .from('shipping_addresses')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .limit(1)
                    .maybeSingle();
                if (addrRows) {
                    dbAddress = {
                        name: addrRows.name,
                        street: addrRows.street,
                        city: addrRows.city,
                        state: addrRows.state || '',
                        zip: addrRows.zip || '',
                        phone: addrRows.phone || '',
                        country: addrRows.country
                    };
                    // Sync to localStorage for checkout use
                    localStorage.setItem('funfairday_shipping_address', JSON.stringify(dbAddress));
                    sessionStorage.setItem('funfairday_shipping_address', JSON.stringify(dbAddress));
                }
            } catch(e) {
                console.log('Supabase address fetch note:', e.message);
            }

            try {
                const cartData = JSON.parse(localStorage.getItem('funfairday_cart') || '[]');
                const count = cartData.reduce((s, i) => s + i.quantity, 0);
                const badge = document.getElementById('cartBadge');
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            } catch(e) {}

            await loadOrders();
            showProfile(userName, dbAddress);
        })();

        async function loadOrders() {
            const container = document.getElementById('ordersContainer');

            try {
                const response = await fetch('/get-orders', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });

                if (!response.ok) throw new Error('Failed to load orders');

                const { orders } = await response.json();

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<div class="no-orders">' +
                        '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>' +
                        '<p>You haven\'t placed any orders yet.</p>' +
                        '<a href="index.html#categories" class="btn btn-primary">Start Shopping</a>' +
                    '</div>';
                    return;
                }

                container.innerHTML = orders.map(function(order) {
                    var date = new Date(order.created_at).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });

                    var itemsHtml = (order.order_items || []).map(function(item) {
                        var details = [];
                        if (item.case_style) details.push('Case: ' + item.case_style + (item.case_color ? ' (' + item.case_color + ')' : ''));
                        if (item.options_text) details.push('Options: ' + item.options_text);
                        var detailStr = details.length > 0 ? '<br><span class="order-item-detail">' + details.join(' | ') + '</span>' : '';
                        return '<div class="order-item">' +
                            '<div><span class="order-item-name">' + item.product_name + '</span> x' + item.quantity + detailStr + '</div>' +
                            '<span class="order-item-price">$' + parseFloat(item.price).toFixed(2) + '</span>' +
                        '</div>';
                    }).join('');

                    var shippingHtml = '';
                    if (order.shipping_method) {
                        shippingHtml += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.06);font-size:0.85rem;">';
                        shippingHtml += '<span style="color:var(--text-light);">Shipping: </span>';
                        shippingHtml += '<span style="font-weight:600;">' + order.shipping_method + '</span>';
                        if (order.shipping_cost > 0) {
                            shippingHtml += ' <span style="color:var(--primary);font-weight:700;">($' + parseFloat(order.shipping_cost).toFixed(2) + ')</span>';
                        }
                        shippingHtml += '</div>';
                    }

                    var trackingHtml = '';
                    if (order.tracking_number) {
                        trackingHtml += '<div style="margin-top:8px;padding:10px 14px;background:#e8f5e9;border-radius:8px;font-size:0.85rem;display:flex;justify-content:space-between;align-items:center;">' +
                            '<div><span style="font-weight:700;color:#2e7d32;">📦 Tracking: </span>' +
                            '<span style="font-family:monospace;font-weight:600;">' + order.tracking_number + '</span></div>';
                        if (order.tracking_url) {
                            trackingHtml += '<a href="' + order.tracking_url + '" target="_blank" class="btn btn-primary" style="padding:6px 14px;font-size:0.8rem;text-decoration:none;">Track Parcel</a>';
                        }
                        trackingHtml += '</div>';
                    }

                    return '<div class="order-card">' +
                        '<div class="order-header">' +
                            '<span class="order-id">#' + order.id.slice(0, 8) + '</span>' +
                            '<span class="order-date">' + date + '</span>' +
                        '</div>' +
                        '<span class="order-status order-status-' + order.status + '">' + order.status + '</span>' +
                        '<div class="order-items">' + itemsHtml + '</div>' +
                        shippingHtml +
                        trackingHtml +
                        '<div style="text-align:right;margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.06);">' +
                            '<span style="font-size:0.85rem;color:var(--text-light);">Total: </span>' +
                            '<span class="order-total">$' + parseFloat(order.total).toFixed(2) + '</span>' +
                        '</div>' +
                    '</div>';
                }).join('');

            } catch (e) {
                console.error('Failed to load orders:', e);
                container.innerHTML = '<div class="loading-state">Failed to load orders. Please try again later.</div>';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        function showProfile(displayName, dbAddress) {
            var container = document.getElementById('profileContainer');

            // Get address from Supabase first, then localStorage, then sessionStorage
            var addrData = dbAddress || null;
            if (!addrData) {
                try {
                    addrData = JSON.parse(localStorage.getItem('funfairday_shipping_address') || 'null');
                    if (!addrData) {
                        addrData = JSON.parse(sessionStorage.getItem('funfairday_shipping_address') || 'null');
                    }
                } catch(e) {}
            }

            var countryName = '';
            if (addrData) {
                countryName = addrData.country;
                // Try to look up a friendly country name
                var countrySelect = document.querySelector('select#addrCountry');
                if (!countrySelect) {
                    // Use a simple mapping
                    var map = { 'HK': 'Hong Kong', 'CN': 'China', 'TW': 'Taiwan', 'US': 'United States', 'GB': 'United Kingdom', 'CA': 'Canada', 'AU': 'Australia', 'JP': 'Japan', 'KR': 'South Korea', 'SG': 'Singapore', 'MY': 'Malaysia', 'PH': 'Philippines', 'TH': 'Thailand', 'VN': 'Vietnam', 'DE': 'Germany', 'FR': 'France', 'IT': 'Italy', 'ES': 'Spain', 'NL': 'Netherlands', 'CH': 'Switzerland', 'SE': 'Sweden', 'NO': 'Norway', 'DK': 'Denmark', 'FI': 'Finland', 'IE': 'Ireland', 'NZ': 'New Zealand', 'ZA': 'South Africa', 'AE': 'United Arab Emirates', 'SA': 'Saudi Arabia', 'BR': 'Brazil', 'OTHERS': 'Other' };
                    countryName = map[addrData.country] || addrData.country;
                }
            }

            var html = '';
            if (displayName) {
                html += '<div style="margin-bottom:12px;"><strong>Name:</strong> ' + displayName + '</div>';
            }
            if (addrData) {
                html += '<div style="margin-bottom:12px;"><strong>Phone:</strong> ' + (addrData.phone || '—') + '</div>';
                html += '<div style="margin-bottom:12px;"><strong>Address:</strong><br>';
                html += escapeHtml(addrData.street) + '<br>';
                html += escapeHtml(addrData.city || '');
                if (addrData.state) html += ', ' + escapeHtml(addrData.state);
                if (addrData.zip) html += ' ' + escapeHtml(addrData.zip);
                html += '<br>' + escapeHtml(countryName) + '</div>';
                html += '<div style="margin-top:16px;">';
                html += '<a href="address-form.html" class="btn btn-primary" style="padding:8px 20px;font-size:0.85rem;text-decoration:none;">Edit Address</a>';
                html += '</div>';
            } else {
                html += '<p style="color:var(--text-light);">You haven\'t saved a shipping address yet.</p>';
                html += '<div style="margin-top:12px;">';
                html += '<a href="address-form.html" class="btn btn-primary" style="padding:8px 20px;font-size:0.85rem;text-decoration:none;">Add Address</a>';
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Cart UI with item rendering
        const cPanel = document.getElementById('cartPanel');
        const cOverlay = document.getElementById('cartOverlay');
        const cItems = document.getElementById('cartItems');
        const cFooter = document.getElementById('cartFooter');
        const cTotal = document.getElementById('cartTotal');

        function renderCart() {
            var items = Cart.getItems();
            var emptyState = cItems.querySelector('.cart-empty');

            if (items.length === 0) {
                if (emptyState) emptyState.style.display = 'flex';
                cFooter.style.display = 'none';
                updateBadge();
                return;
            }
            if (emptyState) emptyState.style.display = 'none';
            cFooter.style.display = 'block';

            cItems.innerHTML = items.map(function(item) {
                var details = '';
                if (item.caseStyle) {
                    details = '<div class="cart-item-custom" style="font-size:0.8rem;color:var(--text-light);margin-top:4px;">';
                    if (item.phoneModel) details += '<span>Model: ' + item.phoneModel + '</span>';
                    details += '<span>Case: ' + item.caseStyle + ' (' + item.caseColor + ')</span>';
                    if (item.optionsText) details += '<span>Options: ' + item.optionsText + '</span>';
                    details += '</div>';
                }
                var priceHtml = Cart.isDiscountActive() ?
                    '<span class="price-original">$' + item.price.toFixed(2) + '</span><span class="price-discounted">$' + Cart.getDiscountedPrice(item.price).toFixed(2) + '</span>' :
                    '$' + item.price.toFixed(2);
                var totalPrice = Cart.isDiscountActive() ?
                    '<span class="price-original">$' + (item.price * item.quantity).toFixed(2) + '</span><span class="price-discounted">$' + (Cart.getDiscountedPrice(item.price) * item.quantity).toFixed(2) + '</span>' :
                    '$' + (item.price * item.quantity).toFixed(2);
                return '<div class="cart-item" data-id="' + item.id + '">' +
                    '<div class="cart-item-info">' +
                    '<div class="cart-item-name">' + item.name + '</div>' +
                    '<div class="cart-item-price">' + priceHtml + ' each</div>' +
                    details +
                    '<div class="cart-item-actions">' +
                    '<button class="cart-qty-btn" data-action="decrease" data-id="' + item.id + '">-</button>' +
                    '<span class="cart-item-qty">' + item.quantity + '</span>' +
                    '<button class="cart-qty-btn" data-action="increase" data-id="' + item.id + '">+</button>' +
                    '<button class="cart-item-remove" data-action="remove" data-id="' + item.id + '"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' +
                    '</div></div>' +
                    '<div class="cart-item-total">' + totalPrice + '</div></div>';
            }).join('');

            var subtotal = Cart.getTotal();
            var totalWithShipping = subtotal + ((window._shippingCost || 0) / 7.8);
            cTotal.textContent = '$' + totalWithShipping.toFixed(2);
            var subEl = document.getElementById('cartSubtotal');
            if (subEl) subEl.textContent = '$' + subtotal.toFixed(2);
            updateBadge();
            updateCartShipping();
        }

        function updateBadge() {
            var badge = document.getElementById('cartBadge');
            if (!badge) return;
            var count = Cart.getItemCount();
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';
        }

        function updateCartShipping() {
            var shippingSection = document.getElementById('cartShipping');
            var destEl = document.getElementById('shippingDestination');
            var missingEl = document.getElementById('cartAddressMissing');
            if (!shippingSection || !destEl) return;

            try {
                var addrStr = localStorage.getItem('funfairday_shipping_address') || sessionStorage.getItem('funfairday_shipping_address');
                var addrData = addrStr ? JSON.parse(addrStr) : null;
                if (!addrData || !addrData.country) {
                    shippingSection.style.display = 'none';
                    if (missingEl) missingEl.style.display = 'flex';
                    return;
                }
                if (missingEl) missingEl.style.display = 'none';

                var countryName = addrData.country;
                var map = { 'HK': 'Hong Kong', 'CN': 'China', 'TW': 'Taiwan', 'US': 'United States', 'GB': 'United Kingdom', 'CA': 'Canada', 'AU': 'Australia', 'JP': 'Japan', 'KR': 'South Korea', 'SG': 'Singapore', 'MY': 'Malaysia', 'PH': 'Philippines', 'TH': 'Thailand', 'VN': 'Vietnam', 'DE': 'Germany', 'FR': 'France', 'IT': 'Italy', 'ES': 'Spain', 'NL': 'Netherlands', 'CH': 'Switzerland', 'SE': 'Sweden', 'NO': 'Norway', 'DK': 'Denmark', 'FI': 'Finland', 'IE': 'Ireland', 'NZ': 'New Zealand', 'ZA': 'South Africa', 'AE': 'United Arab Emirates', 'SA': 'Saudi Arabia', 'BR': 'Brazil', 'OTHERS': 'Other' };
                countryName = map[addrData.country] || addrData.country;

                destEl.textContent = countryName;
                shippingSection.style.display = 'block';
            } catch(e) {
                shippingSection.style.display = 'none';
            }
        }

        // Open/close cart
        document.getElementById('cartBtn').addEventListener('click', function() {
            cPanel.classList.add('active');
            cOverlay.classList.add('active');
            renderCart();
        });
        document.getElementById('cartClose').addEventListener('click', function() {
            cPanel.classList.remove('active');
            cOverlay.classList.remove('active');
        });
        cOverlay.addEventListener('click', function() {
            cPanel.classList.remove('active');
            cOverlay.classList.remove('active');
        });

        // Init
        Cart.init();
        renderCart();

    </script>
    <script src="js/products.js"></script>
    <script src="js/main.js"></script>
</body>
