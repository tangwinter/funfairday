<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FunFairDay</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 100px 20px 60px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .auth-card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--dark);
            text-align: center;
            margin-bottom: 4px;
        }
        .auth-card .page-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .auth-error {
            background: #fce4ec;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .auth-error.show { display: block; }
        .auth-form .form-group {
            margin-bottom: 16px;
        }
        .auth-form .form-group label {
            display: block;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        .auth-form .form-group input,
        .auth-form .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease;
            background: #fff;
            color: var(--dark);
            box-sizing: border-box;
        }
        .auth-form .form-group input:focus,
        .auth-form .form-group select:focus {
            border-color: var(--primary);
        }
        .auth-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .auth-form .required {
            color: var(--primary);
        }
        .auth-form .addr-section {
            border-top: 1px solid #eee;
            padding-top: 16px;
            margin-top: 8px;
        }
        .auth-form .addr-section-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 12px;
        }
        .auth-form .btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 8px;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .auth-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .auth-link a:hover { text-decoration: underline; }
        #customCountryGroup { display: none; }
        @media (max-width: 480px) {
            .auth-form .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .auth-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/FFD Logo.jpeg" alt="FunFairDay Logo" class="logo-img">
                <span class="logo-text">FunFairDay</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
            </nav>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="page-subtitle">Sign in to your account</p>
            <div class="auth-error" id="loginError"></div>
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <!-- Shipping Address Section -->
                <div class="addr-section">
                    <div class="addr-section-title">Shipping Address</div>

                    <div class="form-group">
                        <label for="addrName">Full Name <span class="required">*</span></label>
                        <input type="text" id="addrName" placeholder="e.g. John Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="addrStreet">Street Address <span class="required">*</span></label>
                        <input type="text" id="addrStreet" placeholder="e.g. 123 Main St, Apt 4B" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="addrCity">City <span class="required">*</span></label>
                            <input type="text" id="addrCity" placeholder="Hong Kong" required>
                        </div>
                        <div class="form-group">
                            <label for="addrState">State / Province</label>
                            <input type="text" id="addrState" placeholder="Optional">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="addrZip">ZIP / Postal Code</label>
                            <input type="text" id="addrZip" placeholder="Optional">
                        </div>
                        <div class="form-group">
                            <label for="addrPhone">Phone</label>
                            <input type="tel" id="addrPhone" placeholder="Optional">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="addrCountry">Country <span class="required">*</span></label>
                        <select id="addrCountry" required>
                            <option value="">Select your country...</option>
                        </select>
                    </div>
                    <div class="form-group" id="customCountryGroup">
                        <label for="addrCustomCountry">Enter your country <span class="required">*</span></label>
                        <input type="text" id="addrCustomCountry" placeholder="Type your country name">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
            </form>
            <div class="auth-link">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // === Shipping Countries ===
        var SHIPPING_COUNTRIES = [
            { code: 'AR', name: 'Argentina' }, { code: 'AU', name: 'Australia' },
            { code: 'AT', name: 'Austria' }, { code: 'BE', name: 'Belgium' },
            { code: 'BR', name: 'Brazil' }, { code: 'CA', name: 'Canada' },
            { code: 'CN', name: 'China' }, { code: 'CZ', name: 'Czech Republic' },
            { code: 'DK', name: 'Denmark' }, { code: 'FR', name: 'France' },
            { code: 'DE', name: 'Germany' }, { code: 'GR', name: 'Greece' },
            { code: 'HK', name: 'Hong Kong' }, { code: 'ID', name: 'Indonesia' },
            { code: 'IE', name: 'Ireland' }, { code: 'IT', name: 'Italy' },
            { code: 'JP', name: 'Japan' }, { code: 'MY', name: 'Malaysia' },
            { code: 'MX', name: 'Mexico' }, { code: 'NL', name: 'Netherlands' },
            { code: 'NZ', name: 'New Zealand' }, { code: 'NO', name: 'Norway' },
            { code: 'PH', name: 'Philippines' }, { code: 'PL', name: 'Poland' },
            { code: 'PT', name: 'Portugal' }, { code: 'SA', name: 'Saudi Arabia' },
            { code: 'SG', name: 'Singapore' }, { code: 'ZA', name: 'South Africa' },
            { code: 'KR', name: 'South Korea' }, { code: 'ES', name: 'Spain' },
            { code: 'SE', name: 'Sweden' }, { code: 'CH', name: 'Switzerland' },
            { code: 'TW', name: 'Taiwan' }, { code: 'TH', name: 'Thailand' },
            { code: 'AE', name: 'United Arab Emirates' }, { code: 'GB', name: 'United Kingdom' },
            { code: 'US', name: 'United States' }, { code: 'VN', name: 'Vietnam' },
            { code: 'OTHERS', name: 'Others (Not in the list)' }
        ];

        let supabase = null;

        function showLoginError(msg) {
            const el = document.getElementById('loginError');
            if (el) { el.textContent = msg; el.classList.add('show'); }
        }

        // Populate country dropdown
        (function() {
            var sel = document.getElementById('addrCountry');
            SHIPPING_COUNTRIES.forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c.code;
                opt.textContent = c.name;
                sel.appendChild(opt);
            });
            // Show custom country input when "OTHERS" is selected
            sel.addEventListener('change', function() {
                var customGroup = document.getElementById('customCountryGroup');
                if (this.value === 'OTHERS') {
                    customGroup.style.display = 'block';
                } else {
                    customGroup.style.display = 'none';
                }
            });

            // Pre-fill address from sessionStorage if available (e.g., after registration)
            try {
                var existingAddr = JSON.parse(sessionStorage.getItem('funfairday_shipping_address') || 'null');
                if (existingAddr) {
                    if (document.getElementById('addrName')) document.getElementById('addrName').value = existingAddr.name || '';
                    if (document.getElementById('addrStreet')) document.getElementById('addrStreet').value = existingAddr.street || '';
                    if (document.getElementById('addrCity')) document.getElementById('addrCity').value = existingAddr.city || '';
                    if (document.getElementById('addrState')) document.getElementById('addrState').value = existingAddr.state || '';
                    if (document.getElementById('addrZip')) document.getElementById('addrZip').value = existingAddr.zip || '';
                    if (document.getElementById('addrPhone')) document.getElementById('addrPhone').value = existingAddr.phone || '';
                    if (existingAddr.country) {
                        var countryCode = existingAddr.country;
                        // Check if country is in the dropdown
                        var countryOpt = sel.querySelector('option[value="' + countryCode + '"]');
                        if (countryOpt) {
                            sel.value = countryCode;
                        } else {
                            // Custom country, select OTHERS and show custom input
                            sel.value = 'OTHERS';
                            document.getElementById('customCountryGroup').style.display = 'block';
                            if (document.getElementById('addrCustomCountry')) document.getElementById('addrCustomCountry').value = countryCode;
                        }
                    }
                }
            } catch(e) {}
        })();

        (async function init() {
            try {
                const res = await fetch('/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { showLoginError('Site not configured yet.'); return; }
                supabase = window.supabase.createClient(config.url, config.anonKey);

                var returnTo = new URLSearchParams(window.location.search).get('return_to') || 'index.html';
                sessionStorage.setItem('login_return_to', returnTo);

                const { data: { session } } = await supabase.auth.getSession();
                if (session) { window.location.href = returnTo; }
            } catch(e) {
                showLoginError('Failed to connect. Please contact the site owner.');
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabase) { showLoginError('Supabase not configured.'); return; }

            // Validate address fields
            var addrName = document.getElementById('addrName').value.trim();
            var addrStreet = document.getElementById('addrStreet').value.trim();
            var addrCity = document.getElementById('addrCity').value.trim();
            var addrCountry = document.getElementById('addrCountry').value;
            var addrCustom = document.getElementById('addrCustomCountry').value.trim();

            if (!addrName || !addrStreet || !addrCity) {
                showLoginError('Please fill in your name, street address, and city.');
                return;
            }
            if (!addrCountry) {
                showLoginError('Please select your country.');
                return;
            }
            if (addrCountry === 'OTHERS' && !addrCustom) {
                showLoginError('Please enter your country name.');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            document.getElementById('loginError').classList.remove('show');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // Save shipping address to sessionStorage
                sessionStorage.setItem('funfairday_shipping_address', JSON.stringify({
                    name: addrName,
                    street: addrStreet,
                    city: addrCity,
                    state: document.getElementById('addrState').value.trim(),
                    zip: document.getElementById('addrZip').value.trim(),
                    phone: document.getElementById('addrPhone').value.trim(),
                    country: addrCountry === 'OTHERS' ? addrCustom : addrCountry
                }));

                var returnTo = sessionStorage.getItem('login_return_to') || 'index.html';
                sessionStorage.removeItem('login_return_to');
                window.location.href = returnTo;
            } catch (err) {
                document.getElementById('loginError').textContent = err.message;
                document.getElementById('loginError').classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
