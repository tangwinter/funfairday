<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FunFairDay Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h2>FunFairDay</h2>
            <span>Admin Dashboard</span>
        </div>
        <nav class="admin-nav">
            <a href="dashboard.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="products.html" class="admin-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>Products</span>
            </a>
            <a href="case-styles.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Case Styles</span>
            </a>
            <a href="settings.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Site Settings</span>
            </a>
            <a href="dashboard.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Customers</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <button class="admin-logout-btn" id="logoutBtn">Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>Products</h1>
            <div class="admin-header-actions">
                <select id="categoryFilter" class="admin-select" style="width:200px;">
                    <option value="all">All Categories</option>
                </select>
                <button class="admin-btn admin-btn-primary" id="addProductBtn">+ Add Product</button>
            </div>
        </div>

        <div class="admin-table-wrap">
            <div class="admin-table-header">
                <h2>All Products (<span id="productCount">0</span>)</h2>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Description</th>
                        <th style="width:160px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="5" style="text-align:center;color:#ccc;padding:32px;">Loading products...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add/Edit Product Modal -->
    <div class="admin-modal-overlay" id="productModal">
        <div class="admin-modal">
            <h2 id="modalTitle">Add Product</h2>
            <form id="productForm">
                <input type="hidden" id="editProductId">
                <div class="admin-form-group">
                    <label for="prodName">Product Name</label>
                    <input type="text" id="prodName" class="admin-input" required>
                </div>
                <div class="admin-form-group">
                    <label for="prodCategory">Category</label>
                    <select id="prodCategory" class="admin-select" required></select>
                </div>
                <div class="admin-form-group">
                    <label for="prodPrice">Price ($)</label>
                    <input type="number" id="prodPrice" class="admin-input" step="0.01" min="0" required>
                </div>
                <div class="admin-form-group">
                    <label for="prodDesc">Description</label>
                    <textarea id="prodDesc" class="admin-textarea" required></textarea>
                </div>
                <div class="admin-form-group">
                    <label>Product Image</label>
                    <div class="admin-image-upload">
                        <img id="prodImagePreview" class="admin-image-preview" src="" alt="Product preview" style="display:none;max-width:150px;max-height:150px;">
                        <div id="prodImagePlaceholder" class="admin-image-preview-placeholder" style="width:150px;height:150px;">No image</div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <input type="text" id="prodImage" class="admin-input" placeholder="Image URL..." style="flex:1;">
                        <input type="file" id="prodImageFile" accept="image/*" style="display:none;">
                        <button type="button" class="admin-btn admin-btn-outline" id="uploadProdImageBtn">Upload</button>
                    </div>
                </div>
                <div class="admin-modal-actions">
                    <button type="button" class="admin-btn admin-btn-outline" id="cancelModal">Cancel</button>
                    <button type="submit" class="admin-btn admin-btn-primary" id="saveProductBtn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <div class="admin-toast" id="adminToast"></div>

    <script>
        let supabase = null;
        let accessToken = '';
        let allProducts = [];
        let categories = [];

        async function init() {
            try {
                const res = await fetch('/.netlify/functions/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { throw new Error('Not configured'); }
                supabase = window.supabase.createClient(config.url, config.anonKey);

                const { data: { session }, error } = await supabase.auth.getSession();
                if (error || !session) { window.location.href = 'index.html'; return; }
                accessToken = session.access_token;

                await loadCategories();
                await loadProducts();
            } catch(e) {
                window.location.href = 'index.html';
            }
        }

        async function loadCategories() {
            const { data } = await supabase.from('categories').select('*');
            categories = data || [];
            const filterSel = document.getElementById('categoryFilter');
            const catSel = document.getElementById('prodCategory');
            categories.forEach(c => {
                filterSel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>';
                catSel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>';
            });
        }

        async function loadProducts() {
            try {
                const response = await fetch('/.netlify/functions/get-public-data');
                const data = await response.json();
                allProducts = data.products || [];

                // Also store in window for other pages
                window.__publicData = data;

                renderProducts();
            } catch (e) {
                // Fallback to direct Supabase
                const { data } = await supabase.from('products').select('*').order('sort_order');
                allProducts = data || [];
                renderProducts();
            }
        }

        function renderProducts() {
            const filter = document.getElementById('categoryFilter').value;
            const filtered = filter === 'all' ? allProducts : allProducts.filter(p => p.category_id === filter);
            document.getElementById('productCount').textContent = filtered.length;

            const tbody = document.getElementById('productsTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#ccc;padding:32px;">No products found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(p => {
                const cat = categories.find(c => c.id === p.category_id);
                return '<tr data-id="' + p.id + '">' +
                    '<td style="font-weight:700;">' + p.name + '</td>' +
                    '<td>' + (cat ? cat.name : p.category_id) + '</td>' +
                    '<td style="font-weight:700;">$' + parseFloat(p.price).toFixed(2) + '</td>' +
                    '<td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--admin-text);">' + (p.description || '') + '</td>' +
                    '<td>' +
                        '<button class="admin-btn admin-btn-sm admin-btn-outline edit-btn" data-id="' + p.id + '" style="margin-right:4px;">Edit</button>' +
                        '<button class="admin-btn admin-btn-sm admin-btn-danger delete-btn" data-id="' + p.id + '">Delete</button>' +
                    '</td>' +
                '</tr>';
            }).join('');

            // Attach event listeners
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.id));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(btn.dataset.id));
            });
        }

        function openEditModal(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('editProductId').value = product.id;
            document.getElementById('prodName').value = product.name;
            document.getElementById('prodCategory').value = product.category_id;
            document.getElementById('prodPrice').value = product.price;
            document.getElementById('prodDesc').value = product.description || '';
            document.getElementById('prodImage').value = product.image_url || '';
            updateProdPreview(product.image_url || '');
            document.getElementById('productModal').classList.add('active');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('editProductId').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodCategory').value = categories.length > 0 ? categories[0].id : '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodImage').value = '';
            updateProdPreview('');
            document.getElementById('productModal').classList.add('active');
        }

        function updateProdPreview(url) {
            const img = document.getElementById('prodImagePreview');
            const placeholder = document.getElementById('prodImagePlaceholder');
            if (url) {
                img.src = url;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                img.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }

        async function uploadProductImage(file) {
            if (!file) return null;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const base64 = e.target.result.split(',')[1];
                        const response = await fetch('/.netlify/functions/admin-upload-image', {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ file_name: file.name, file_base64: base64, folder: 'products' })
                        });
                        const data = await response.json();
                        if (data.success) resolve(data.url);
                        else reject(new Error(data.error));
                    } catch (err) { reject(err); }
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('uploadProdImageBtn').addEventListener('click', function() {
            document.getElementById('prodImageFile').click();
        });

        document.getElementById('prodImageFile').addEventListener('change', async function(e) {
            if (this.files && this.files[0]) {
                try {
                    const url = await uploadProductImage(this.files[0]);
                    if (url) {
                        document.getElementById('prodImage').value = url;
                        updateProdPreview(url);
                    }
                } catch(err) {
                    showToast('Upload failed: ' + err.message, 'error');
                }
            }
        });

        document.getElementById('prodImage').addEventListener('input', function() {
            updateProdPreview(this.value);
        });

        document.getElementById('addProductBtn').addEventListener('click', openAddModal);
        document.getElementById('cancelModal').addEventListener('click', () => {
            document.getElementById('productModal').classList.remove('active');
        });
        document.getElementById('categoryFilter').addEventListener('change', renderProducts);

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProductBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const editId = document.getElementById('editProductId').value;
            const name = document.getElementById('prodName').value;
            const category_id = document.getElementById('prodCategory').value;
            const price = parseFloat(document.getElementById('prodPrice').value);
            const description = document.getElementById('prodDesc').value;
            const image_url = document.getElementById('prodImage').value || null;

            try {
                if (editId) {
                    // Update existing product
                    const response = await fetch('/.netlify/functions/admin-update-product', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: editId, name, description, price, image_url, category_id })
                    });
                    if (!response.ok) throw new Error('Failed to update');
                    showToast('Product updated successfully', 'success');
                } else {
                    // Add new product
                    const newId = category_id + '-' + Date.now();
                    const response = await fetch('/.netlify/functions/admin-add-product', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: newId, name, description, price, image_url, category_id })
                    });
                    if (!response.ok) throw new Error('Failed to add');
                    showToast('Product added successfully', 'success');
                }

                document.getElementById('productModal').classList.remove('active');
                await loadProducts();
            } catch (e) {
                showToast(e.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = editId ? 'Save Product' : 'Add Product';
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const response = await fetch('/.netlify/functions/admin-delete-product', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                if (!response.ok) throw new Error('Failed to delete');
                showToast('Product deleted', 'success');
                await loadProducts();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('adminToast');
            toast.textContent = msg;
            toast.className = 'admin-toast active ' + (type || '');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        init();
    </script>
</body>
</html>
