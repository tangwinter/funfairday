<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Styles - FunFairDay Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        .color-swatch { display:inline-block; width:32px; height:32px; border-radius:6px; border:2px solid #eee; vertical-align:middle; margin-right:4px; background-size:cover; background-position:center; }
        .color-label { vertical-align:middle; }
        .color-item { display:inline-flex; align-items:center; gap:6px; background:#f0f0f0; padding:4px 10px; border-radius:6px; margin:2px; }
        .variant-row { display:flex; gap:10px; align-items:center; background:#f8f8f8; padding:10px; border-radius:8px; margin-bottom:8px; }
        .variant-row input[type="text"] { flex:1; }
        .variant-row select { width:130px; }
        .variant-preview { width:60px; height:60px; border-radius:8px; border:2px solid #ddd; background-size:cover; background-position:center; flex-shrink:0; }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h2>FunFairDay</h2>
            <span>Admin Dashboard</span>
        </div>
        <nav class="admin-nav">
            <a href="dashboard.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="products.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>Products</span>
            </a>
            <a href="case-styles.html" class="admin-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Case Styles</span>
            </a>
            <a href="settings.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Site Settings</span>
            </a>
            <a href="dashboard.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Customers</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <button class="admin-logout-btn" id="logoutBtn">Logout</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>Case Styles</h1>
            <div class="admin-header-actions">
                <select id="modelFilter" class="admin-select" style="width:220px;">
                    <option value="">-- Select Phone Model --</option>
                </select>
            </div>
        </div>

        <div class="admin-table-wrap" id="stylesSection" style="display:none;">
            <div class="admin-table-header">
                <h2>Styles for <span id="selectedModelName"></span> (<span id="styleCount">0</span>)</h2>
                <button class="admin-btn admin-btn-primary" id="addStyleBtn">+ Add Style</button>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Style Shape</th>
                        <th>Name</th>
                        <th>Variants</th>
                        <th style="width:120px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="stylesTableBody">
                    <tr><td colspan="4" style="text-align:center;color:#ccc;padding:32px;">Select a phone model above</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add/Edit Style Modal -->
    <div class="admin-modal-overlay" id="styleModal">
        <div class="admin-modal" style="max-width:700px;">
            <h2 id="modalTitle">Add Style</h2>
            <form id="styleForm">
                <input type="hidden" id="editStyleId">
                <input type="hidden" id="editModelId">
                <div class="admin-form-group">
                    <label for="styleName">Style Name</label>
                    <input type="text" id="styleName" class="admin-input" placeholder="e.g. Wave Transparent" required>
                </div>
                <div class="admin-form-group">
                    <label>Shape Photo</label>
                    <div class="admin-image-upload">
                        <img id="styleImagePreview" class="admin-image-preview" src="" alt="Style preview" style="display:none;max-width:200px;max-height:150px;">
                        <div id="styleImagePlaceholder" class="admin-image-preview-placeholder" style="width:200px;height:150px;">No photo</div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <input type="text" id="styleImageUrl" class="admin-input" placeholder="Image URL..." style="flex:1;">
                        <input type="file" id="styleImageFile" accept="image/*" style="display:none;">
                        <button type="button" class="admin-btn admin-btn-outline" id="uploadStyleImageBtn">Upload</button>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label style="display:flex;justify-content:space-between;align-items:center;">
                        <span>Photo Variants</span>
                        <button type="button" class="admin-btn admin-btn-sm admin-btn-outline" id="addVariantBtn">+ Add Variant</button>
                    </label>
                    <div id="variantsContainer" style="margin-top:8px;">
                        <p style="color:#ccc;font-size:0.85rem;">No variants yet. Click "+ Add Variant" to add photos.</p>
                    </div>
                </div>

                <div class="admin-modal-actions">
                    <button type="button" class="admin-btn admin-btn-outline" id="cancelModal">Cancel</button>
                    <button type="submit" class="admin-btn admin-btn-primary" id="saveStyleBtn">Save Style</button>
                </div>
            </form>
        </div>
    </div>

    <div class="admin-toast" id="adminToast"></div>

    <script>
        let supabase = null;
        let accessToken = '';
        let models = [];
        let styles = [];
        let currentModelId = '';

        async function init() {
            try {
                const res = await fetch('/.netlify/functions/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { throw new Error('Not configured'); }
                supabase = window.supabase.createClient(config.url, config.anonKey);

                const { data: { session }, error } = await supabase.auth.getSession();
                if (error || !session) { window.location.href = 'index.html'; return; }
                accessToken = session.access_token;

                await loadModels();
            } catch(e) {
                window.location.href = 'index.html';
            }
        }

        async function api(action, data) {
            const response = await fetch('/.netlify/functions/admin-case-styles', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...data })
            });
            const result = await response.json();
            if (!result.success) throw new Error(result.error || 'Request failed');
            return result;
        }

        async function loadModels() {
            try {
                const result = await api('list-models');
                models = result.models || [];
                const sel = document.getElementById('modelFilter');
                models.forEach(m => {
                    sel.innerHTML += '<option value="' + m.id + '">' + m.name + '</option>';
                });
            } catch (e) {
                showToast('Failed to load models', 'error');
            }
        }

        async function loadStyles(modelId) {
            try {
                const result = await api('list-styles', { model_id: modelId });
                styles = result.styles || [];
                renderStyles();
            } catch (e) {
                showToast('Failed to load styles', 'error');
            }
        }

        function renderStyles() {
            document.getElementById('styleCount').textContent = styles.length;
            document.getElementById('selectedModelName').textContent = currentModelId ? models.find(m => m.id === currentModelId)?.name || '' : '';

            const tbody = document.getElementById('stylesTableBody');
            if (styles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#ccc;padding:32px;">No styles yet. Click "+ Add Style" to add one.</td></tr>';
                return;
            }

            tbody.innerHTML = styles.map(s => {
                const variants = (s.colors || []).map(c => {
                    if (c.type === 'hex') {
                        return '<span class="color-item"><span class="color-swatch" style="background:' + c.value + '"></span><span class="color-label">' + c.label + '</span></span>';
                    } else {
                        return '<span class="color-item"><span class="color-swatch" style="background-image:url(' + c.value + ')"></span><span class="color-label">' + c.label + '</span></span>';
                    }
                }).join('');
                const imgHtml = s.image_url ? '<span class="color-swatch" style="background-image:url(' + s.image_url + ');width:48px;height:48px;"></span>' : '<span style="color:#ccc;">No image</span>';
                return '<tr data-id="' + s.id + '">' +
                    '<td>' + imgHtml + '</td>' +
                    '<td style="font-weight:700;">' + s.name + '</td>' +
                    '<td>' + (variants || '<span style="color:#ccc;">No variants</span>') + '</td>' +
                    '<td>' +
                        '<button class="admin-btn admin-btn-sm admin-btn-outline edit-btn" data-id="' + s.id + '" style="margin-right:4px;">Edit</button>' +
                        '<button class="admin-btn admin-btn-sm admin-btn-danger delete-btn" data-id="' + s.id + '">Delete</button>' +
                    '</td>' +
                '</tr>';
            }).join('');

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.id));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteStyle(btn.dataset.id));
            });
        }

        let variantCounter = 0;

        function addVariantRow(variant) {
            variantCounter++;
            const container = document.getElementById('variantsContainer');
            const empty = container.querySelector('p');
            if (empty) empty.remove();

            const v = variant || { label: '', type: 'photo', value: '' };
            const rowId = 'variant-' + variantCounter;

            const div = document.createElement('div');
            div.className = 'variant-row';
            div.id = rowId;
            div.innerHTML =
                '<div class="variant-preview" id="' + rowId + '-preview" style="' + (v.type === 'hex' && v.value ? 'background:' + v.value + ';' : v.value ? 'background-image:url(' + v.value + ');' : '') + '"></div>' +
                '<input type="text" class="variant-label" placeholder="Label e.g. Pink" value="' + v.label + '">' +
                '<select class="variant-type">' +
                    '<option value="photo"' + (v.type === 'photo' ? ' selected' : '') + '>Photo</option>' +
                    '<option value="hex"' + (v.type === 'hex' ? ' selected' : '') + '>Color Swatch</option>' +
                '</select>' +
                '<div style="display:flex;gap:4px;flex:1;">' +
                    '<input type="text" class="variant-value" placeholder="URL or hex color" value="' + v.value + '" style="flex:1;">' +
                    '<input type="file" class="variant-file-input" accept="image/*" style="display:none;">' +
                    '<button type="button" class="admin-btn admin-btn-sm admin-btn-outline variant-upload-btn">Browse</button>' +
                '</div>' +
                '<button type="button" class="admin-btn admin-btn-sm admin-btn-danger variant-remove-btn" style="padding:4px 8px;">X</button>';

            container.appendChild(div);

            // Type switch handler
            div.querySelector('.variant-type').addEventListener('change', function() {
                updateVariantPreview(rowId);
            });

            // Upload button
            div.querySelector('.variant-upload-btn').addEventListener('click', function() {
                div.querySelector('.variant-file-input').click();
            });

            div.querySelector('.variant-file-input').addEventListener('change', async function(e) {
                if (this.files && this.files[0]) {
                    try {
                        const url = await uploadImage(this.files[0], 'case-styles');
                        if (url) {
                            div.querySelector('.variant-value').value = url;
                            div.querySelector('.variant-type').value = 'photo';
                            updateVariantPreview(rowId);
                        }
                    } catch(err) {
                        showToast('Upload failed: ' + err.message, 'error');
                    }
                }
            });

            // Value change preview update
            div.querySelector('.variant-value').addEventListener('input', function() {
                updateVariantPreview(rowId);
            });

            // Remove button
            div.querySelector('.variant-remove-btn').addEventListener('click', function() {
                div.remove();
                if (container.querySelectorAll('.variant-row').length === 0) {
                    container.innerHTML = '<p style="color:#ccc;font-size:0.85rem;">No variants yet. Click "+ Add Variant" to add photos.</p>';
                }
            });
        }

        function updateVariantPreview(rowId) {
            const div = document.getElementById(rowId);
            if (!div) return;
            const preview = div.querySelector('.variant-preview');
            const type = div.querySelector('.variant-type').value;
            const value = div.querySelector('.variant-value').value;
            if (type === 'hex' && value) {
                preview.style.background = value;
                preview.style.backgroundImage = 'none';
            } else if (type === 'photo' && value) {
                preview.style.backgroundImage = 'url(' + value + ')';
                preview.style.background = 'transparent';
            } else {
                preview.style.background = '';
                preview.style.backgroundImage = '';
            }
        }

        async function uploadImage(file, folder) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const base64 = e.target.result.split(',')[1];
                        const response = await fetch('/.netlify/functions/admin-upload-image', {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ file_name: file.name, file_base64: base64, folder: folder || 'case-styles' })
                        });
                        const data = await response.json();
                        if (data.success) resolve(data.url);
                        else reject(new Error(data.error));
                    } catch (err) { reject(err); }
                };
                reader.readAsDataURL(file);
            });
        }

        function getVariantsFromForm() {
            const rows = document.querySelectorAll('.variant-row');
            const variants = [];
            rows.forEach(row => {
                const label = row.querySelector('.variant-label').value.trim();
                const type = row.querySelector('.variant-type').value;
                const value = row.querySelector('.variant-value').value.trim();
                if (label && value) {
                    variants.push({ label, type, value });
                }
            });
            return variants;
        }

        function openEditModal(id) {
            const style = styles.find(s => s.id === id);
            if (!style) return;
            document.getElementById('modalTitle').textContent = 'Edit Style';
            document.getElementById('editStyleId').value = style.id;
            document.getElementById('editModelId').value = style.model_id;
            document.getElementById('styleName').value = style.name;
            document.getElementById('styleImageUrl').value = style.image_url || '';
            updatePreview('styleImagePreview', 'styleImagePlaceholder', style.image_url);

            document.getElementById('variantsContainer').innerHTML = '';
            variantCounter = 0;
            (style.colors || []).forEach(v => addVariantRow(v));
            if (!style.colors || style.colors.length === 0) {
                document.getElementById('variantsContainer').innerHTML = '<p style="color:#ccc;font-size:0.85rem;">No variants yet. Click "+ Add Variant" to add photos.</p>';
            }

            document.getElementById('styleModal').classList.add('active');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Style';
            document.getElementById('editStyleId').value = '';
            document.getElementById('editModelId').value = currentModelId;
            document.getElementById('styleName').value = '';
            document.getElementById('styleImageUrl').value = '';
            updatePreview('styleImagePreview', 'styleImagePlaceholder', '');
            document.getElementById('variantsContainer').innerHTML = '<p style="color:#ccc;font-size:0.85rem;">No variants yet. Click "+ Add Variant" to add photos.</p>';
            variantCounter = 0;
            document.getElementById('styleModal').classList.add('active');
        }

        function updatePreview(imgId, placeholderId, url) {
            const img = document.getElementById(imgId);
            const placeholder = document.getElementById(placeholderId);
            if (url) {
                img.src = url;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                img.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }

        document.getElementById('modelFilter').addEventListener('change', function() {
            currentModelId = this.value;
            if (currentModelId) {
                document.getElementById('stylesSection').style.display = 'block';
                loadStyles(currentModelId);
            } else {
                document.getElementById('stylesSection').style.display = 'none';
            }
        });

        document.getElementById('addStyleBtn').addEventListener('click', openAddModal);
        document.getElementById('addVariantBtn').addEventListener('click', () => addVariantRow());

        // Upload style shape photo
        document.getElementById('uploadStyleImageBtn').addEventListener('click', function() {
            document.getElementById('styleImageFile').click();
        });

        document.getElementById('styleImageFile').addEventListener('change', async function(e) {
            if (this.files && this.files[0]) {
                try {
                    const url = await uploadImage(this.files[0], 'case-styles');
                    if (url) {
                        document.getElementById('styleImageUrl').value = url;
                        updatePreview('styleImagePreview', 'styleImagePlaceholder', url);
                    }
                } catch(err) {
                    showToast('Upload failed: ' + err.message, 'error');
                }
            }
        });

        document.getElementById('styleImageUrl').addEventListener('input', function() {
            updatePreview('styleImagePreview', 'styleImagePlaceholder', this.value);
        });

        document.getElementById('cancelModal').addEventListener('click', () => {
            document.getElementById('styleModal').classList.remove('active');
        });

        document.getElementById('styleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveStyleBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const editId = document.getElementById('editStyleId').value;
            const model_id = document.getElementById('editModelId').value;
            const name = document.getElementById('styleName').value.trim();
            const image_url = document.getElementById('styleImageUrl').value.trim() || null;
            const colors = getVariantsFromForm();

            try {
                if (editId) {
                    await api('update-style', { id: editId, name, image_url, colors });
                    showToast('Style updated', 'success');
                } else {
                    await api('add-style', { model_id, name, image_url, colors });
                    showToast('Style added', 'success');
                }

                document.getElementById('styleModal').classList.remove('active');
                await loadStyles(currentModelId);
            } catch (e) {
                showToast(e.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = editId ? 'Save Style' : 'Add Style';
        });

        async function deleteStyle(id) {
            if (!confirm('Are you sure you want to delete this style?')) return;
            try {
                await api('delete-style', { id });
                showToast('Style deleted', 'success');
                await loadStyles(currentModelId);
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('adminToast');
            toast.textContent = msg;
            toast.className = 'admin-toast active ' + (type || '');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        init();
    </script>
</body>
</html>
