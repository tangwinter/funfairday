<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FunFairDay</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="admin-login-page">
        <div class="admin-login-card">
            <h1>FunFairDay Admin</h1>
            <p>Sign in to manage your store</p>
            <div class="admin-login-error" id="loginError"></div>
            <form id="loginForm">
                <div class="admin-form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="admin-input" placeholder="admin@funfairday.com" required>
                </div>
                <div class="admin-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="admin-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:1rem;" id="loginBtn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        let supabase = null;

        function showAdminError(msg) {
            const el = document.getElementById('loginError');
            if (el) { el.textContent = msg; el.classList.add('show'); }
        }

        (async function init() {
            try {
                const res = await fetch('/.netlify/functions/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { showAdminError('Supabase not configured on server.'); return; }
                supabase = window.supabase.createClient(config.url, config.anonKey);

                // Check if already logged in
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    checkAdminRole(session.access_token);
                }
            } catch(e) {
                showAdminError('Failed to connect. Please contact the site owner.');
            }
        })();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabase) { showAdminError('Supabase not configured.'); return; }
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loginError.classList.remove('show');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // Check if user has admin role
                const { data: roles, error: roleError } = await supabase
                    .from('user_roles')
                    .select('role')
                    .eq('user_id', data.user.id)
                    .eq('role', 'admin');

                if (roleError) throw roleError;

                if (!roles || roles.length === 0) {
                    await supabase.auth.signOut();
                    throw new Error('Not authorized as admin');
                }

                window.location.href = 'dashboard.html';

            } catch (err) {
                loginError.textContent = err.message;
                loginError.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        async function checkAdminRole(token) {
            try {
                const response = await fetch('/.netlify/functions/admin-get-orders', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    window.location.href = 'dashboard.html';
                } else {
                    await supabase.auth.signOut();
                }
            } catch (e) {
                // Not configured yet, stay on login
            }
        }
    </script>
</body>
</html>
