<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FunFairDay Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h2>FunFairDay</h2>
            <span>Admin Dashboard</span>
        </div>
        <nav class="admin-nav">
            <a href="dashboard.html" class="admin-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="products.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                <span>Products</span>
            </a>
            <a href="settings.html" class="admin-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Site Settings</span>
            </a>
            <a href="#" class="admin-nav-item" id="navOrders">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span>Orders</span>
            </a>
        </nav>
        <div class="admin-sidebar-footer">
            <button class="admin-logout-btn" id="logoutBtn">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <span id="adminEmail" style="color:var(--admin-text);font-size:0.9rem;"></span>
        </div>

        <!-- Stats Cards -->
        <div class="admin-cards">
            <div class="admin-card">
                <div class="admin-card-value" id="totalProducts">-</div>
                <div class="admin-card-label">Total Products</div>
            </div>
            <div class="admin-card">
                <div class="admin-card-value" id="totalOrders">-</div>
                <div class="admin-card-label">Total Orders</div>
            </div>
            <div class="admin-card">
                <div class="admin-card-value" id="pendingOrders">-</div>
                <div class="admin-card-label">Pending Orders</div>
            </div>
            <div class="admin-card">
                <div class="admin-card-value" id="totalRevenue">-</div>
                <div class="admin-card-label">Total Revenue</div>
            </div>
        </div>

        <!-- Recent Orders -->
        <div class="admin-table-wrap">
            <div class="admin-table-header">
                <h2>Recent Orders</h2>
                <button class="admin-btn admin-btn-outline admin-btn-sm" id="refreshBtn">Refresh</button>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr><td colspan="6" style="text-align:center;color:#ccc;padding:32px;">Loading orders...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="admin-toast" id="adminToast"></div>

    <script>
        let supabase = null;
        let accessToken = '';

        async function init() {
            try {
                const res = await fetch('/.netlify/functions/get-supabase-config');
                const config = await res.json();
                if (!config.configured) { throw new Error('Not configured'); }
                supabase = window.supabase.createClient(config.url, config.anonKey);

                const { data: { session }, error } = await supabase.auth.getSession();
                if (error || !session) {
                    window.location.href = 'index.html';
                    return;
                }
                accessToken = session.access_token;
                document.getElementById('adminEmail').textContent = session.user.email;

                loadDashboard();
            } catch(e) {
                console.error('Init error:', e);
                window.location.href = 'index.html';
            }
        }

        async function loadDashboard() {
            try {
                // Load products count
                const { data: products, error: pErr } = await supabase.from('products').select('id');
                if (!pErr) document.getElementById('totalProducts').textContent = products.length;

                // Load orders
                const response = await fetch('/.netlify/functions/admin-get-orders', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });

                if (!response.ok) throw new Error('Failed to load orders');

                const { orders } = await response.json();
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;

                const totalRevenue = orders.reduce((sum, o) => sum + parseFloat(o.total || 0), 0);
                document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toFixed(2);

                // Render orders table
                const tbody = document.getElementById('ordersTableBody');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#ccc;padding:32px;">No orders yet</td></tr>';
                } else {
                    tbody.innerHTML = orders.slice(0, 10).map(o => {
                        const date = new Date(o.created_at).toLocaleDateString();
                        const itemCount = o.order_items ? o.order_items.reduce((s, i) => s + i.quantity, 0) : 0;
                        return '<tr>' +
                            '<td style="font-weight:700;">#' + o.id.slice(0, 8) + '</td>' +
                            '<td>' + (o.customer_email || 'Guest') + '</td>' +
                            '<td>' + itemCount + ' items</td>' +
                            '<td style="font-weight:700;">$' + parseFloat(o.total).toFixed(2) + '</td>' +
                            '<td><span class="admin-badge admin-badge-' + o.status + '">' + o.status + '</span></td>' +
                            '<td>' + date + '</td>' +
                        '</tr>';
                    }).join('');
                }

            } catch (e) {
                console.error('Dashboard error:', e);
                showToast('Failed to load dashboard data', 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('adminToast');
            toast.textContent = msg;
            toast.className = 'admin-toast active ' + (type || '');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        document.getElementById('refreshBtn').addEventListener('click', loadDashboard);

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });

        document.getElementById('navOrders').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('ordersTableBody').scrollIntoView({ behavior: 'smooth' });
            loadDashboard();
        });

        init();
    </script>
</body>
</html>
